<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeliner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&family=Pacifico&family=Playfair+Display:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="styles.css">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #grid-wrap {
      height: 100%;
      box-sizing: border-box;
      padding: 10px 3rem 10px 10px;
      display: flex;
      flex-direction: column;
    }

    #scroll-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .row-wrap {
      flex: 1;
      height: auto;
    }

    .tick-labels {
      margin-bottom: 4px;
    }

    .segment {
      overflow: hidden;
    }

    .seg-label {
      padding: 0 10px;
      font-size: 1rem;
      font-weight: 500;
      font-family: var(--seg-font, 'Fredoka'), sans-serif;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #grid-wrap.scroll-mode .seg-label {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0;
      display: flex;
      align-items: center;
      text-overflow: unset;
    }

    #grid-wrap.scroll-mode .seg-label>span {
      flex-shrink: 0;
      padding: 0 10px;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div id="grid-wrap">
    <div id="scroll-inner">
      <div id="tick-labels" class="tick-labels"></div>
      <div id="grid"></div>
    </div>
    <div id="time-indicator"></div>
  </div>

  <script src="shared.js"></script>
  <script>
    const state = decodeState(location.hash);
    if (!state) {document.body.innerHTML = '<p>No timeline data.</p>'; throw new Error('no data');}

    if (state.font) document.documentElement.style.setProperty('--seg-font', `'${state.font}'`);
    if (state.tickColor) document.documentElement.style.setProperty('--tick-color', state.tickColor);
    const SHAPE_STYLES = {
      parallelogram: {borderRadius: '0', clipPath: 'polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%)'},
      rounded: {borderRadius: '8px', clipPath: 'none'},
    };
    const shapeStyle = SHAPE_STYLES[state.shape] ?? SHAPE_STYLES.rounded;

    if (state.indicatorColor) {
      document.getElementById('time-indicator').style.background = state.indicatorColor;
    }

    const {start, end, interval, rows} = state;
    const cellCount = Math.floor(spanDuration(start, end) / interval);

    buildTickLabels(document.getElementById('tick-labels'), start, cellCount, interval);

    const grid = document.getElementById('grid');
    (rows || []).forEach(row => {
      const wrap = document.createElement('div');
      wrap.className = 'row-wrap';
      wrap.appendChild(buildRowBackground(cellCount));

      (row.segments || []).forEach(seg => {
        const from = Math.min(seg.from, seg.to);
        const to = Math.max(seg.from, seg.to);
        const el = document.createElement('div');
        el.className = 'segment';
        el.style.left = (from / cellCount * 100) + '%';
        el.style.width = ((to - from + 1) / cellCount * 100) + '%';
        el.style.background = seg.color;
        el.style.borderRadius = shapeStyle.borderRadius;
        el.style.clipPath = shapeStyle.clipPath;
        if (seg.label) {
          const lbl = document.createElement('span');
          lbl.className = 'seg-label';
          if (needsDarkText(seg.color)) lbl.style.color = '#111';
          const txt = document.createElement('span');
          txt.textContent = seg.label;
          lbl.appendChild(txt);
          el.appendChild(lbl);
        }
        wrap.appendChild(el);
      });

      grid.appendChild(wrap);
    });

    const scrollMode = !!state.scrollMode;
    const scrollWindow = state.scrollWindow || 3600;
    const totalDuration = spanDuration(start, end);
    const indicator = document.getElementById('time-indicator');

    if (scrollMode) {
      indicator.style.display = 'none';
      document.getElementById('grid-wrap').classList.add('scroll-mode');
      document.getElementById('scroll-inner').style.width = (totalDuration / scrollWindow * 100) + '%';

      const gridWrap = document.getElementById('grid-wrap');
      const gridWrapPaddingLeft = parseFloat(getComputedStyle(gridWrap).paddingLeft);
      function scrollTick() {
        const now = nowSeconds();
        const elapsed = now >= start ? now - start : now + 86400 - start;
        const clamped = Math.max(0, Math.min(elapsed, totalDuration));
        const offsetPct = (clamped / totalDuration) * 100;
        document.getElementById('scroll-inner').style.transform =
          'translateX(-' + offsetPct + '%)';

        const viewportLeft = gridWrap.getBoundingClientRect().left + gridWrapPaddingLeft;
        document.querySelectorAll('#grid .segment').forEach(seg => {
          const lbl = seg.querySelector('.seg-label');
          if (!lbl) return;
          lbl.style.left = Math.max(0, viewportLeft - seg.getBoundingClientRect().left) + 'px';
          const txt = lbl.firstElementChild;
          if (txt) lbl.style.justifyContent = txt.offsetWidth > lbl.offsetWidth ? 'flex-end' : '';
        });
      }
      scrollTick();
      setInterval(scrollTick, 10);
    } else {
      function tick() {
        updateTimeIndicator(indicator, start, end, nowSeconds());
      }
      tick();
      setInterval(tick, 10);
    }
  </script>
</body>

</html>

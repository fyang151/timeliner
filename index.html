<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeliner – Editor</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      user-select: none;
    }

    input[type=text],
    input[type=time],
    input[type=number],
    select {
      user-select: text;
    }

    .row-wrap.ghost {
      opacity: 0.35;
    }

    .segment {
      z-index: 1;
      overflow: visible;
      cursor: grab;
    }

    .segment.selected {
      box-shadow: 0 0 0 2.5px rgba(0, 0, 0, 0.45);
      z-index: 200;
    }

    .resize-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 8px;
      cursor: ew-resize;
      z-index: 2;
    }

    .resize-left {
      left: 0;
      border-radius: 8px 0 0 8px;
    }

    .resize-right {
      right: 0;
      border-radius: 0 8px 8px 0;
    }

    .segment input[type=text] {
      width: 100%;
      border: none;
      background: transparent;
      padding: 0 10px;
      font-size: 1rem;
      font-weight: 500;
      color: white;
      outline: none;
      min-width: 0;
      pointer-events: none;
    }

    .segment input::placeholder {
      color: rgba(255, 255, 255, 0.55);
    }

    .dark-text::placeholder {
      color: rgba(0, 0, 0, 0.35);
    }

    .palette {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      display: flex;
      gap: 6px;
      padding: 8px;
      background: white;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      z-index: 100;
      align-items: center;
    }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      transition: transform 0.1s;
    }

    .swatch:hover {
      transform: scale(1.2);
    }

    .swatch.active {
      border-color: #333;
    }

    .tick-labels {
      margin-bottom: 4px;
      margin-right: 3rem;
    }

    .palette-delete {
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 0 2px;
    }

    .palette-delete img {
      width: 16px;
      height: 16px;
    }

    #setup-form {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    #setup-form label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 1rem;
      font-weight: 500;
      color: #555;
    }

    #setup-form input[type=time],
    #setup-form input[type=number] {
      border: 2px solid #ebebeb;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 1rem;
      font-family: 'Fredoka', sans-serif;
      color: #333;
      outline: none;
      transition: border-color 0.15s;
    }

    #setup-form input:focus {
      border-color: #45AAF2;
    }

    #setup-form input[type=number] {
      -moz-appearance: textfield;
    }

    #setup-form input[type=number]::-webkit-outer-spin-button,
    #setup-form input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .interval-error {
      font-size: 0.82rem;
      color: #e74c3c;
      font-weight: 500;
    }

    #share-line {
      margin-top: 20px;
      display: flex;
      gap: 16px;
    }

    .share-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .share-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .share-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #333;
    }

    .share-col input {
      width: 100%;
      border: 2px solid #ebebeb;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      font-family: 'Fredoka', sans-serif;
      color: #111;
      outline: none;
      background: #fafafa;
      box-sizing: border-box;
    }

    .copy-btn {
      background: none;
      border: 2px solid #ebebeb;
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: border-color 0.15s;
    }

    .copy-btn:hover {
      border-color: #45AAF2;
    }

    .copy-btn img {
      width: 14px;
      height: 14px;
      filter: invert(60%);
    }

    @keyframes flash-green {

      0%,
      60% {
        filter: invert(60%) sepia(1) saturate(4) hue-rotate(90deg);
      }

      100% {
        filter: invert(60%);
      }
    }

    .copy-btn.copied img {
      animation: flash-green 0.5s ease-out forwards;
    }
  </style>
</head>

<body>
  <h1>Timeliner</h1>

  <form id="setup-form">
    <label>Start <input type="time" id="input-start" required></label>
    <label>End <input type="time" id="input-end" required></label>
    <label>Interval <input type="number" id="input-interval" value="15" min="1" max="240" style="width:4ch">
      min</label>
    <span id="interval-error" class="interval-error"></span>
  </form>

  <div id="tick-labels" class="tick-labels"></div>
  <div id="grid-wrap">
    <div id="grid"></div>
    <div id="time-indicator"></div>
  </div>

  <div id="share-line" style="display:none">
    <div class="share-col">
      <div class="share-header">
        <span class="share-label">Link</span>
        <button class="copy-btn" data-target="share-url" title="Copy link"><img src="icons/copy.svg"></button>
      </div>
      <input type="text" id="share-url" readonly>
    </div>
    <div class="share-col">
      <div class="share-header">
        <span class="share-label">Embed</span>
        <button class="copy-btn" data-target="share-iframe" title="Copy iframe"><img src="icons/copy.svg"></button>
      </div>
      <input type="text" id="share-iframe" readonly>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    const COLORS = ['#FF6B6B', '#FF9F43', '#FECA57', '#26de81', '#2BCBBA', '#45AAF2', '#A55EEA', '#FD79A8', '#000000', '#FFFFFF'];

    let config = null;
    let rows = [];
    let cellCount = 0;

    let drag = null;
    let pendingEl = null;
    let moveDrag = null;
    let resizeDrag = null;

    let selectedKey = null;

    function needsDarkText(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 160;
    }

    function getSegmentEl(ri, si) {
      const rowEl = document.querySelector(`.row-wrap[data-ri="${ri}"]`);
      return rowEl ? rowEl.querySelectorAll('.segment')[si] : null;
    }
    function selectSegment(ri, si) {
      deselectSegment();
      selectedKey = {ri, si};
      const el = getSegmentEl(ri, si);
      if (!el) return;
      el.classList.add('selected');
      closePalettes();
      const pal = buildPalette(ri, si, rows[ri].segments[si]);
      el.appendChild(pal);
      const r = pal.getBoundingClientRect();
      const overflow = r.right - window.innerWidth + 8;
      if (overflow > 0) pal.style.left = (-overflow) + 'px';
      el.querySelector('input').focus();
    }
    function deselectSegment() {
      if (!selectedKey) return;
      const el = getSegmentEl(selectedKey.ri, selectedKey.si);
      if (el) {el.classList.remove('selected'); closePalettes(); el.querySelector('input').blur();}
      selectedKey = null;
    }

    function encodeState() {return btoa(JSON.stringify({...config, rows}));}
    function viewURL() {return location.href.replace(/\/[^/]*$/, '/view.html') + '#' + encodeState();}

    function virtualNowMinutes() {
      const d = new Date();
      return d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;
    }

    function getCellIndex(rowEl, clientX) {
      const rect = rowEl.getBoundingClientRect();
      return Math.max(0, Math.min(cellCount - 1, Math.floor((clientX - rect.left) / rect.width * cellCount)));
    }

    function updateShare() {
      const hasAny = rows.some(r => r.segments.length > 0);
      document.getElementById('share-line').style.display = hasAny ? 'flex' : 'none';
      if (hasAny) {
        const url = viewURL();
        document.getElementById('share-url').value = url;
        document.getElementById('share-iframe').value = `<iframe src="${url}" width="100%" height="200" frameborder="0"></iframe>`;
      }
    }

    function closePalettes() {
      document.querySelectorAll('.palette').forEach(p => p.remove());
    }

    // palette
    function buildPalette(ri, si, seg) {
      const pal = document.createElement('div');
      pal.className = 'palette';
      COLORS.forEach(c => {
        const sw = document.createElement('div');
        sw.className = 'swatch' + (seg.color === c ? ' active' : '');
        sw.style.background = c;
        if (c === '#FFFFFF') sw.style.borderColor = '#ddd';
        sw.addEventListener('mousedown', ev => {
          ev.stopPropagation();
          rows[ri].segments[si].color = c;
          renderAllRows();
          updateShare();
          selectSegment(ri, si);
        });
        pal.appendChild(sw);
      });
      const del = document.createElement('div');
      del.className = 'palette-delete';
      del.innerHTML = '<img src="icons/trash.svg">';
      del.addEventListener('mousedown', ev => {
        ev.stopPropagation();
        rows[ri].segments.splice(si, 1);
        if (!rows[ri].segments.length) rows.splice(ri, 1);
        renderAllRows();
        updateShare();
      });
      pal.appendChild(del);
      return pal;
    }

    // segment
    function createSegmentEl(seg, ri, si) {
      const el = document.createElement('div');
      el.className = 'segment';
      const from = Math.min(seg.from, seg.to);
      const to = Math.max(seg.from, seg.to);
      el.style.left = (from / cellCount * 100) + '%';
      el.style.width = ((to - from + 1) / cellCount * 100) + '%';
      el.style.background = seg.color;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = seg.label || '';
      input.placeholder = 'Name';
      if (needsDarkText(seg.color)) {input.style.color = '#111'; input.classList.add('dark-text');}
      input.addEventListener('input', () => {rows[ri].segments[si].label = input.value; updateShare();});
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {deselectSegment(); return;}
        if (e.key === 'Backspace' && input.value === '') {
          e.preventDefault();
          selectedKey = null;
          rows[ri].segments.splice(si, 1);
          if (!rows[ri].segments.length) rows.splice(ri, 1);
          renderAllRows();
          updateShare();
        }
      });
      el.appendChild(input);

      ['left', 'right'].forEach(edge => {
        const handle = document.createElement('div');
        handle.className = `resize-handle resize-${edge}`;
        handle.addEventListener('mousedown', e => {
          e.stopPropagation();
          e.preventDefault();
          selectSegment(ri, si);
          const seg = rows[ri].segments[si];
          const from = Math.min(seg.from, seg.to);
          const to = Math.max(seg.from, seg.to);
          const rowEl = document.querySelector(`.row-wrap[data-ri="${ri}"]`);
          resizeDrag = {
            ri, si, edge, el, rowEl,
            fixed: edge === 'left' ? to : from,
            previewFrom: from, previewTo: to
          };
        });
        el.appendChild(handle);
      });

      el.addEventListener('mousedown', e => {
        e.stopPropagation();
        e.preventDefault();
        selectSegment(ri, si);
        const seg = rows[ri].segments[si];
        const from = Math.min(seg.from, seg.to);
        const to = Math.max(seg.from, seg.to);
        const rowEl = document.querySelector(`.row-wrap[data-ri="${ri}"]`);
        const clickCell = getCellIndex(rowEl, e.clientX);
        moveDrag = {
          ri, si, from, to,
          len: to - from,
          cellOffset: Math.max(0, clickCell - from),
          el, rowEl,
          previewFrom: from, previewTo: to,
          moved: false
        };
      });

      return el;
    }

    // row
    function createRowEl(ri, isGhost) {
      const wrap = document.createElement('div');
      wrap.className = 'row-wrap' + (isGhost ? ' ghost' : '');
      wrap.dataset.ri = ri;

      wrap.appendChild(buildRowBackground(cellCount));

      wrap.addEventListener('mousedown', e => {
        if (e.target.closest('.segment')) return;
        e.preventDefault();
        closePalettes();

        let rowIndex = ri;
        if (isGhost) {
          rows.push({segments: []});
          rowIndex = rows.length - 1;
          renderAllRows();
        }

        const rowEl = document.querySelector(`.row-wrap[data-ri="${rowIndex}"]`);
        const ci = getCellIndex(rowEl, e.clientX);
        drag = {rowIndex, from: ci, to: ci};

        pendingEl = document.createElement('div');
        pendingEl.className = 'segment';
        pendingEl.style.background = COLORS[0];
        pendingEl.style.opacity = '0.6';
        rowEl.appendChild(pendingEl);
        updatePendingEl(rowEl);
      });

      return wrap;
    }

    function updatePendingEl(rowEl) {
      if (!drag || !pendingEl) return;
      const from = Math.min(drag.from, drag.to);
      const to = Math.max(drag.from, drag.to);
      pendingEl.style.left = (from / cellCount * 100) + '%';
      pendingEl.style.width = ((to - from + 1) / cellCount * 100) + '%';
    }

    function renderAllRows() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      rows.forEach((row, ri) => {
        const wrap = createRowEl(ri, false);
        row.segments.forEach((seg, si) => wrap.appendChild(createSegmentEl(seg, ri, si)));
        grid.appendChild(wrap);
      });
      grid.appendChild(createRowEl(rows.length, true));
    }

    document.addEventListener('mousemove', e => {
      if (resizeDrag) {
        const currentCell = getCellIndex(resizeDrag.rowEl, e.clientX);
        const newFrom = Math.max(0, Math.min(cellCount - 1, resizeDrag.edge === 'left' ? Math.min(currentCell, resizeDrag.fixed) : resizeDrag.fixed));
        const newTo = Math.max(0, Math.min(cellCount - 1, resizeDrag.edge === 'right' ? Math.max(currentCell, resizeDrag.fixed) : resizeDrag.fixed));
        resizeDrag.previewFrom = newFrom;
        resizeDrag.previewTo = newTo;
        resizeDrag.el.style.left = (newFrom / cellCount * 100) + '%';
        resizeDrag.el.style.width = ((newTo - newFrom + 1) / cellCount * 100) + '%';
        document.body.style.cursor = 'ew-resize';
        return;
      }
      if (moveDrag) {
        const currentCell = getCellIndex(moveDrag.rowEl, e.clientX);
        let newFrom = currentCell - moveDrag.cellOffset;
        newFrom = Math.max(0, Math.min(cellCount - 1 - moveDrag.len, newFrom));
        const newTo = newFrom + moveDrag.len;
        if (newFrom !== moveDrag.previewFrom || newTo !== moveDrag.previewTo) {
          if (!moveDrag.moved) {
            moveDrag.moved = true;
            closePalettes();
            document.body.style.cursor = 'grabbing';
          }
          moveDrag.previewFrom = newFrom;
          moveDrag.previewTo = newTo;
          moveDrag.el.style.left = (newFrom / cellCount * 100) + '%';
          moveDrag.el.style.width = ((newTo - newFrom + 1) / cellCount * 100) + '%';
        }
      }
      if (!drag) return;
      const rowEl = document.querySelector(`.row-wrap[data-ri="${drag.rowIndex}"]`);
      if (!rowEl) return;
      drag.to = getCellIndex(rowEl, e.clientX);
      updatePendingEl(rowEl);
    });

    document.addEventListener('mouseup', () => {
      if (resizeDrag) {
        rows[resizeDrag.ri].segments[resizeDrag.si].from = resizeDrag.previewFrom;
        rows[resizeDrag.ri].segments[resizeDrag.si].to = resizeDrag.previewTo;
        document.body.style.cursor = '';
        renderAllRows();
        updateShare();
        selectSegment(resizeDrag.ri, resizeDrag.si);
        resizeDrag = null;
        return;
      }
      if (moveDrag) {
        if (moveDrag.moved) {
          rows[moveDrag.ri].segments[moveDrag.si].from = moveDrag.previewFrom;
          rows[moveDrag.ri].segments[moveDrag.si].to = moveDrag.previewTo;
          document.body.style.cursor = '';
          renderAllRows();
          updateShare();
          selectSegment(moveDrag.ri, moveDrag.si);
        }
        moveDrag = null;
        return;
      }
      if (!drag) return;
      if (pendingEl) {pendingEl.remove(); pendingEl = null;}
      const from = Math.min(drag.from, drag.to);
      const to = Math.max(drag.from, drag.to);
      const ri = drag.rowIndex;
      rows[ri].segments.push({from, to, label: '', color: COLORS[0]});
      const si = rows[ri].segments.length - 1;
      drag = null;
      renderAllRows();
      updateShare();
      selectSegment(ri, si);
    });

    document.addEventListener('mousedown', e => {
      if (!e.target.closest('.palette') && !e.target.closest('.segment')) deselectSegment();
    });

    function buildGrid() {
      const startMin = timeToMinutes(config.start);
      const endMin = timeToMinutes(config.end);
      cellCount = Math.floor(spanDuration(startMin, endMin) / config.interval);
      if (cellCount <= 0) return;

      buildTickLabels(document.getElementById('tick-labels'), startMin, cellCount, config.interval);

      renderAllRows();
    }

    function tickIndicator() {
      if (!config) return;
      const start = timeToMinutes(config.start);
      const end = timeToMinutes(config.end);
      const now = virtualNowMinutes();
      updateTimeIndicator(document.getElementById('time-indicator'), start, end, now);
    }
    setInterval(tickIndicator, 1000);

    document.getElementById('setup-form').addEventListener('submit', e => e.preventDefault());

    function resizeIntervalInput() {
      const el = document.getElementById('input-interval');
      el.style.width = Math.max(4, (el.value || '').length + 2) + 'ch';
    }

    function setIntervalError(msg) {
      document.getElementById('interval-error').textContent = msg;
    }

    function applyConfig() {
      const start = document.getElementById('input-start').value;
      const end = document.getElementById('input-end').value;
      let intervalEl = document.getElementById('input-interval');
      let interval = parseInt(intervalEl.value);
      setIntervalError('');
      if (!start || !end || start === end) return;
      if (!interval || isNaN(interval) || interval < 1) {
        interval = 15;
        intervalEl.value = 15;
        resizeIntervalInput();
      }
      const startMin = timeToMinutes(start);
      const endMin = timeToMinutes(end);
      const duration = spanDuration(startMin, endMin);
      if (interval >= duration) {
        setIntervalError(`Interval must be less than ${duration} min`);
        return;
      }
      config = {start, end, interval};
      rows = [];
      buildGrid();
      updateShare();
    }

    document.getElementById('input-interval').addEventListener('focus', e => {e.target.value = ''; resizeIntervalInput();});
    document.getElementById('input-interval').addEventListener('input', resizeIntervalInput);
    document.getElementById('input-interval').addEventListener('keydown', e => {
      if (e.key === 'Enter') {e.preventDefault(); applyConfig(); e.target.blur();}
    });
    ['input-start', 'input-end', 'input-interval'].forEach(id =>
      document.getElementById(id).addEventListener('change', applyConfig)
    );

    const saved = decodeState(location.hash);
    if (saved) {
      config = {start: saved.start, end: saved.end, interval: saved.interval};
      rows = saved.rows || [];
      document.getElementById('input-start').value = config.start;
      document.getElementById('input-end').value = config.end;
      document.getElementById('input-interval').value = config.interval;
      resizeIntervalInput();
    } else {
      const startH = (new Date().getHours() + 1) % 24;
      const startMin = startH * 60;
      const endMin = Math.min(startMin + 180, 23 * 60 + 59);
      document.getElementById('input-start').value = minutesToTime(startMin);
      document.getElementById('input-end').value = minutesToTime(endMin);
      config = {start: minutesToTime(startMin), end: minutesToTime(endMin), interval: 15};
      resizeIntervalInput();
    }
    buildGrid();
    updateShare();

    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = document.getElementById(btn.dataset.target).value;
        navigator.clipboard.writeText(val).then(() => {
          btn.clsLive('copied');
          void btn.offsetWidth;
          btn.classList.add('copied');
        });
      });
    });
  </script>
</body>

</html>
